; DollmanMute runtime config.
; VerboseLog=1 enables per-event mute logging for debugging.
; EnableDollmanRadioMute=1 silences ordinary Dollman chatter
;   (hat/glasses reactions etc) together with their subtitles.
; EnableThrowRecallSubtitleMute=1 blocks dollman throw/recall subtitles
;   via MsgShowSubtitle payload hash filter.
; ScannerMode=0 keeps scanner audio unchanged.
; ScannerMode=1 reduces scanner intensity.
; ScannerMode=2 fully mutes scanner audio.

[General]
Enabled=1
VerboseLog=0
EnableDollmanRadioMute=1
EnableThrowRecallSubtitleMute=1
ScannerMode=0
