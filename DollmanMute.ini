; DollmanMute research runtime config.
; Current stable baseline keeps selector probe ON and subtitle runtime ON.
; build.ps1 does not overwrite an existing game-root DollmanMute.ini.
; If a key is missing in your game-root ini, core_main.c falls back to code defaults.
; EnableSubtitleRuntimeHooks=1 arms ShowSubtitle-side runtime muting.
; EnableSubtitleFamilyTracking=1 keeps producer-side family tracking available
;   for research; runtime family muting can classify directly from subtitle payload.
; EnableSubtitleProducerProbe=1 is for deeper offline research only.
; EnableBuilderProbe=1 arms builder/shared-sink probes.
; EnableTalkDispatcherProbe=1 is currently unsafe on this build.
; ScannerMode=0 keeps scanner audio unchanged.
; ScannerMode=1 reduces scanner intensity.
; ScannerMode=2 fully mutes scanner audio.

[General]
Enabled=1
VerboseLog=0
EnableDollmanRadioMute=1
EnableThrowRecallSubtitleMute=0
ActiveSubtitleStrategy=1
EnableSubtitleRuntimeHooks=1
EnableSubtitleFamilyTracking=0
EnableSubtitleProducerProbe=0
EnableBuilderProbe=0
EnableSelectorProbe=1
EnableTalkDispatcherProbe=0
ScannerMode=0
