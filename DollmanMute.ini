; DollmanMute runtime config.
; build.ps1 does not overwrite an existing game-root DollmanMute.ini.
; If a key is missing in your game-root ini, core_main.c falls back to code defaults.
; EnableVoiceMute=1 mutes Dollman gameplay voice lines.
; EnableSubtitleMute=1 mutes Dollman gameplay subtitles.
; F8 marks a fresh probe session window in DollmanMute.log.
; ScannerMode=0 keeps scanner audio unchanged.
; ScannerMode=1 reduces scanner intensity.
; ScannerMode=2 fully mutes scanner audio.

[General]
Enabled=1
VerboseLog=0
EnableVoiceMute=1
EnableSubtitleMute=1
ScannerMode=0
